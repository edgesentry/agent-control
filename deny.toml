# cargo-deny policy — see THIRD_PARTY.md and docs/plan/purpose.md (§1.3).
# CI: cargo deny check licenses
# Allow-list only (cargo-deny 0.19+): licenses not listed are denied (incl. GPL/AGPL/LGPL/MPL).

[graph]
targets = []

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[licenses]
private = { ignore = true }
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MIT-0",
  "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
