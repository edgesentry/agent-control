site_name: agent-control
site_description: ACS-aligned runtime control plane for AI agents (Cap Vista CS01 + CS02).
site_url: https://edgesentry.github.io/agent-control/
repo_url: https://github.com/edgesentry/agent-control
repo_name: edgesentry/agent-control
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - content.action.edit
    - content.code.copy

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - admonition

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture:
    - Security boundary: architecture/security-boundary.md
    - Repository layout: architecture/repo-layout.md
    - ACS hook subset: architecture/acs-hooks.md
  - Operations:
    - On-prem deployment: operations/on-prem.md
    - Development: operations/development.md
  - Submission (Cap Vista):
    - Roadmap: submission/roadmap.md
    - OWASP coverage matrix: submission/owasp-coverage.md
    - Demo script: submission/demo.md
    - Phase 1 trial: submission/phase1-trial.md
    - ACS alignment: submission/acs-alignment.md
